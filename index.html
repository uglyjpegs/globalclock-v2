<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Clock - World Time Zones</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Global Clock</h1>
            <p>World Time Zones at a Glance</p>
        </header>
        
        <div class="main-content">
            <div class="globe-section">
                <div class="globe-container">
                    <div id="globe"></div>
                    <div class="globe-controls">
                        <button id="toggleRotation" class="btn">
                            <i class="fas fa-sync"></i> Toggle Rotation
                        </button>
                        <button id="toggleTimezones" class="btn">
                            <i class="fas fa-globe"></i> Toggle Timezones
                        </button>
                    </div>
                </div>
            </div>

            <div class="timezones-section">
                <div class="clocks-container">
                    <!-- Clock cards will be dynamically added here -->
                </div>
                <button id="addMoreTimezones" class="btn add-more-btn">
                    <i class="fas fa-plus"></i> Add More Timezones
                </button>
            </div>
        </div>

        <div class="controls">
            <button id="toggleTheme" class="btn">
                <i class="fas fa-moon"></i> Toggle Theme
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
